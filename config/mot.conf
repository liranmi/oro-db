# oro-db MOT engine configuration
# Standalone mode — disable NUMA and unnecessary features

enable_numa = false
affinity_mode = none

# Use virtual reservation (faster startup, no pre-fault)
reserve_memory_mode = virtual
store_memory_policy = compact
lazy_load_chunk_directory = true

# Checkpoint and redo log are auto-disabled in standalone mode (MOT_STANDALONE)

# Logging
log_level = INFO

# Disable JIT (not available in standalone mode)
enable_mot_codegen = false

# Disable statistics printing
enable_stats = false
